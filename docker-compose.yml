services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-8000}:80"
    extra_hosts:
      # Lets Xdebug reach the host IDE on Linux hosts (already works on Desktop).
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    restart: always
    environment:
      # Single source of truth: read from the project .env. The app connects to
      # the same DATABASE_NAME/DATABASE_PASSWORD, so there is nothing to keep in sync.
      - MARIADB_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MARIADB_DATABASE=${DATABASE_NAME}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3307}:3306" # host 3307 by default -> container 3306 (keeps local MySQL/XAMPP on 3306)
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
